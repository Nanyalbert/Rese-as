<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Reviews</title>
</head>
<body>
<div id="reviews-container"></div>
<script>
const PLACE_ID = 'ChIJE3jQROGjMpQRNAvP3fUNl3I';
const API_KEY = 'AIzaSyDJ1pr3oCPNfTdGbsm2qPzwFKqsOB8yMxo';

fetch(`https://places.googleapis.com/v1/places/${PLACE_ID}?fields=displayName,rating,userRatingCount,reviews&languageCode=es&key=${API_KEY}`)
  .then(r => r.json())
  .then(data => {
    console.log('Respuesta completa:', JSON.stringify(data, null, 2));
    document.getElementById('reviews-container').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
  })
  .catch(e => console.error(e));
</script>
</body>
</html>
